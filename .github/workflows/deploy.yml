name: Deploy to Infomaniak

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.claude/**'
  workflow_dispatch:

# Un seul deploy a la fois. Un nouveau push sur main annule le precedent run
# encore en cours -> pas de 2 uploads FTP simultanes qui se marcheraient dessus.
concurrency:
  group: deploy-infomaniak
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # @sparticuz/chromium est utilise en CI (voir scripts/prerender.mjs),
      # le Chromium bundled de Puppeteer n'est jamais invoque -> skip du DL (~100MB).
      PUPPETEER_SKIP_DOWNLOAD: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build + prerender
        run: npm run build:prerender

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: /
          dangerous-clean-slate: true
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
            **/stats.html
            **/.ftpquota
