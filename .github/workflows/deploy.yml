name: Deploy to Infomaniak

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.claude/**'
  workflow_dispatch:

# Un seul deploy a la fois. Un nouveau push sur main annule le precedent run
# encore en cours -> pas de 2 uploads SFTP simultanes qui se marcheraient dessus.
concurrency:
  group: deploy-infomaniak
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # @sparticuz/chromium est utilise en CI (voir scripts/prerender.mjs),
      # le Chromium bundled de Puppeteer n'est jamais invoque -> skip du DL (~100MB).
      PUPPETEER_SKIP_DOWNLOAD: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build + prerender
        run: npm run build:prerender

      # Deploiement SFTP via rsync sur SSH (port 22).
      # Remplace l'ancien FTP-Deploy-Action : le port 21 est bloque
      # (ETIMEDOUT depuis le runner GitHub vers Infomaniak).
      # --delete supprime cote serveur les fichiers absents de dist/
      # -> equivalent strict de l'ancien dangerous-clean-slate: true.
      # Flags volontairement sans -p/-o/-a : l'hebergement mutualise
      # Infomaniak refuse la preservation owner/permissions.
      - name: Deploy via SFTP (rsync over SSH)
        uses: easingthemes/ssh-deploy@v5.1.1
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
          REMOTE_HOST:     ${{ secrets.SFTP_HOST }}
          REMOTE_USER:     ${{ secrets.SFTP_USERNAME }}
          REMOTE_PORT:     22
          SOURCE:          "dist/"
          TARGET:          ${{ secrets.SFTP_TARGET_DIR }}
          ARGS:            "-rlvz --delete --exclude=.git* --exclude=node_modules --exclude=.DS_Store --exclude=stats.html --exclude=.ftpquota"
