  <g stroke="#8c47d1" stroke-opacity="0.12" stroke-width="0.4">
    <line x1="960" y1="460" x2="220" y2="240"/>
    <line x1="960" y1="460" x2="420" y2="220"/>
    <line x1="960" y1="460" x2="620" y2="260"/>
    <line x1="960" y1="460" x2="820" y2="230"/>
    <line x1="960" y1="460" x2="1100" y2="230"/>
    <line x1="960" y1="460" x2="1300" y2="260"/>
    <line x1="960" y1="460" x2="1500" y2="220"/>
    <line x1="960" y1="460" x2="1700" y2="240"/>
    <line x1="960" y1="460" x2="220" y2="400"/>
    <line x1="960" y1="460" x2="420" y2="380"/>
    <line x1="960" y1="460" x2="620" y2="420"/>
    <line x1="960" y1="460" x2="1300" y2="420"/>
    <line x1="960" y1="460" x2="1500" y2="380"/>
    <line x1="960" y1="460" x2="1700" y2="400"/>
    <line x1="960" y1="460" x2="220" y2="560"/>
    <line x1="960" y1="460" x2="420" y2="540"/>
    <line x1="960" y1="460" x2="620" y2="580"/>
    <line x1="960" y1="460" x2="1300" y2="580"/>
    <line x1="960" y1="460" x2="1500" y2="540"/>
    <line x1="960" y1="460" x2="1700" y2="560"/>
    <line x1="960" y1="460" x2="220" y2="720"/>
    <line x1="960" y1="460" x2="420" y2="700"/>
    <line x1="960" y1="460" x2="620" y2="740"/>
    <line x1="960" y1="460" x2="820" y2="730"/>
    <line x1="960" y1="460" x2="1100" y2="730"/>
    <line x1="960" y1="460" x2="1300" y2="740"/>
    <line x1="960" y1="460" x2="1500" y2="700"/>
    <line x1="960" y1="460" x2="1700" y2="720"/>
  </g>

