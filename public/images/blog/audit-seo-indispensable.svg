  <g transform="translate(1140 620)"><use href="#xh"/><text x="0" y="26" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.85" class="num" font-size="10">31</text></g>

  <!-- ═══════════════ CENTRAL HUB ═══════════════ -->
  <g transform="translate(960 460)">
    <circle cx="0" cy="0" r="130" fill="#05030c" fill-opacity="0.85" stroke="#b57dd6" stroke-opacity="0.55" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="105" fill="none" stroke="#8c47d1" stroke-opacity="0.35" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="78"  fill="none" stroke="#8c47d1" stroke-opacity="0.28" stroke-width="0.5"/>

    <!-- Small KUMO mark -->
    <g fill="none" stroke="#d9bff0" stroke-opacity="0.80" stroke-width="1" filter="url(#softglow)">
      <polygon points="60,0 42.4,42.4 0,60 -42.4,42.4 -60,0 -42.4,-42.4 0,-60 42.4,-42.4"/>
    </g>
    <circle cx="0" cy="0" r="3" fill="#f5ebd8" fill-opacity="0.95"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#f5ebd8" stroke-opacity="0.45" stroke-width="0.5"/>

    <text x="0" y="-90" text-anchor="middle" fill="#b57dd6" fill-opacity="0.85" class="mono" font-size="10">CENTRE D'AUDIT</text>
