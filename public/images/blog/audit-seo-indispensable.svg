  <g transform="translate(420 540)"><use href="#xhFlag"/><text x="22" y="4" fill="#f5ebd8" class="num" font-size="10">16</text></g>
  <g transform="translate(620 580)"><use href="#xh"/><text x="22" y="4" fill="#f5ebd8" fill-opacity="0.85" class="num" font-size="10">17</text></g>
  <g transform="translate(1300 580)"><use href="#xh"/><text x="22" y="4" fill="#f5ebd8" fill-opacity="0.85" class="num" font-size="10">18</text></g>
