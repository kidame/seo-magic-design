  <g transform="translate(220 720)"><use href="#xh"/><text x="0" y="26" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.85" class="num" font-size="10">21</text></g>
  <g transform="translate(420 700)"><use href="#xh"/><text x="0" y="26" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.85" class="num" font-size="10">22</text></g>
  <g transform="translate(620 740)"><use href="#xh"/><text x="0" y="26" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.85" class="num" font-size="10">23</text></g>
  <g transform="translate(820 730)"><use href="#xhFlag"/><text x="0" y="26" text-anchor="middle" fill="#f5ebd8" class="num" font-size="10">24</text></g>
  <g transform="translate(1100 730)"><use href="#xh"/><text x="0" y="26" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.85" class="num" font-size="10">25</text></g>
  <g transform="translate(1300 740)"><use href="#xh"/><text x="0" y="26" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.85" class="num" font-size="10">26</text></g>
  <g transform="translate(1500 700)"><use href="#xh"/><text x="0" y="26" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.85" class="num" font-size="10">27</text></g>
  <g transform="translate(1700 720)"><use href="#xh"/><text x="0" y="26" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.85" class="num" font-size="10">28</text></g>

  <!-- Bottom extras to complete 31: 29, 30, 31 around center -->
  <g transform="translate(780 620)"><use href="#xh"/><text x="0" y="26" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.85" class="num" font-size="10">29</text></g>
