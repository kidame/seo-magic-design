    <text x="100" y="984" fill="#f5ebd8" fill-opacity="0.85" class="mono-soft" font-size="11">— INTERACTIF</text>
    <text x="100" y="1004" fill="#b57dd6" fill-opacity="0.75" class="mono-soft" font-size="11">— PLAN 90 JOURS</text>
    <text x="100" y="1024" fill="#b57dd6" fill-opacity="0.55" class="mono" font-size="10">— PRIORITÉS CLASSÉES</text>
