  <!-- Row 1: y=240 -->
  <g transform="translate(220 240)"><use href="#xh"/><text x="0" y="-22" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.85" class="num" font-size="10">01</text></g>
  <g transform="translate(420 220)"><use href="#xh"/><text x="0" y="-22" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.85" class="num" font-size="10">02</text></g>
  <g transform="translate(620 260)"><use href="#xhFlag"/><text x="0" y="-22" text-anchor="middle" fill="#f5ebd8" class="num" font-size="10">03</text></g>
  <g transform="translate(820 230)"><use href="#xh"/><text x="0" y="-22" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.85" class="num" font-size="10">04</text></g>
  <g transform="translate(1100 230)"><use href="#xh"/><text x="0" y="-22" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.85" class="num" font-size="10">05</text></g>
  <g transform="translate(1300 260)"><use href="#xh"/><text x="0" y="-22" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.85" class="num" font-size="10">06</text></g>
  <g transform="translate(1500 220)"><use href="#xhFlag"/><text x="0" y="-22" text-anchor="middle" fill="#f5ebd8" class="num" font-size="10">07</text></g>
