<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Créer un site internet en 2026 pour PME suisses — plan d'architecte KUMO : 7 critères structurels à exiger de son prestataire web.">
  <title>Créer un site internet 2026 — Blueprint KUMO</title>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600&amp;family=JetBrains+Mono:wght@400;500&amp;family=Instrument+Serif:ital@1&amp;display=swap');
      .display   { font-family: 'Instrument Serif', 'Sora', Georgia, serif; font-style: italic; font-weight: 400; }
      .brand     { font-family: 'Sora', 'Helvetica Neue', Arial, sans-serif; font-weight: 600; letter-spacing: 0.04em; }
      .mono      { font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace; font-weight: 400; letter-spacing: 0.18em; }
      .mono-soft { font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace; font-weight: 400; letter-spacing: 0.12em; }
      .jp        { font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', serif; font-weight: 400; }
    </style>

    <radialGradient id="ground" cx="50%" cy="46%" r="70%">
      <stop offset="0%"   stop-color="#120a22"/>
      <stop offset="55%"  stop-color="#0a0714"/>
      <stop offset="100%" stop-color="#05030c"/>
    </radialGradient>

    <filter id="softglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grain" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="0.6" fill="#b57dd6" fill-opacity="0.06"/>
      <circle cx="40" cy="40" r="0.4" fill="#b57dd6" fill-opacity="0.05"/>
    </pattern>

    <!-- Blueprint grid: 80px major, 20px minor -->
    <pattern id="gridMinor" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#8c47d1" stroke-opacity="0.08" stroke-width="0.4"/>
    </pattern>
    <pattern id="gridMajor" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#8c47d1" stroke-opacity="0.18" stroke-width="0.6"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#ground)"/>
  <rect x="200" y="230" width="1520" height="640" fill="url(#gridMinor)"/>
  <rect x="200" y="230" width="1520" height="640" fill="url(#gridMajor)"/>
  <rect width="1920" height="1080" fill="url(#grain)"/>

  <rect x="80" y="80" width="1760" height="920" fill="none"
        stroke="#8c47d1" stroke-opacity="0.18" stroke-width="0.6"/>

  <g stroke="#d9bff0" stroke-opacity="0.45" stroke-width="1">
    <path d="M 60 96 L 96 96 M 96 60 L 96 96"/>
    <path d="M 1860 96 L 1824 96 M 1824 60 L 1824 96"/>
    <path d="M 60 984 L 96 984 M 96 1020 L 96 984"/>
    <path d="M 1860 984 L 1824 984 M 1824 1020 L 1824 984"/>
  </g>

  <!-- Dimension line (top) -->
  <g stroke="#b57dd6" stroke-opacity="0.65" stroke-width="0.6">
    <line x1="200" y1="200" x2="1720" y2="200"/>
    <line x1="200" y1="195" x2="200" y2="205"/>
    <line x1="1720" y1="195" x2="1720" y2="205"/>
  </g>
  <text x="960" y="192" text-anchor="middle" fill="#b57dd6" fill-opacity="0.80" class="mono" font-size="10">7 CRITÈRES &#8212; CAHIER DES CHARGES SITE WEB PME</text>

  <!-- Dimension line (left) -->
  <g stroke="#b57dd6" stroke-opacity="0.65" stroke-width="0.6">
    <line x1="170" y1="230" x2="170" y2="870"/>
    <line x1="165" y1="230" x2="175" y2="230"/>
    <line x1="165" y1="870" x2="175" y2="870"/>
  </g>
  <text x="155" y="550" fill="#b57dd6" fill-opacity="0.70" class="mono" font-size="10" transform="rotate(-90 155 550)" text-anchor="middle">STACK VERTICALE</text>

  <!-- Architectural plan: 7 stacked horizontal bands representing the 7 criteria -->
  <g>
    <!-- Band 1: Performance -->
    <g transform="translate(200 250)">
      <rect x="0" y="0" width="1520" height="68" fill="none" stroke="#b57dd6" stroke-opacity="0.55" stroke-width="0.8"/>
      <g stroke="#8c47d1" stroke-opacity="0.32" stroke-width="0.5">
        <line x1="120" y1="0" x2="120" y2="68"/>
        <line x1="260" y1="0" x2="260" y2="68"/>
        <line x1="1280" y1="0" x2="1280" y2="68"/>
        <line x1="1400" y1="0" x2="1400" y2="68"/>
      </g>
      <text x="24" y="28" fill="#f5ebd8" fill-opacity="0.90" class="mono" font-size="11">01</text>
      <text x="24" y="52" fill="#b57dd6" fill-opacity="0.80" class="mono-soft" font-size="11">PERFORMANCE</text>
      <text x="280" y="42" fill="#f5ebd8" fill-opacity="0.82" class="brand" font-size="14">Core Web Vitals — LCP &lt; 2.5s</text>
      <text x="1300" y="42" fill="#b57dd6" fill-opacity="0.75" class="mono-soft" font-size="10">95/100</text>
    </g>

    <!-- Band 2: SEO technique -->
    <g transform="translate(200 326)">
      <rect x="0" y="0" width="1520" height="68" fill="none" stroke="#b57dd6" stroke-opacity="0.55" stroke-width="0.8"/>
      <g stroke="#8c47d1" stroke-opacity="0.32" stroke-width="0.5">
        <line x1="120" y1="0" x2="120" y2="68"/>
        <line x1="260" y1="0" x2="260" y2="68"/>
        <line x1="1280" y1="0" x2="1280" y2="68"/>
        <line x1="1400" y1="0" x2="1400" y2="68"/>
      </g>
      <text x="24" y="28" fill="#f5ebd8" fill-opacity="0.90" class="mono" font-size="11">02</text>
      <text x="24" y="52" fill="#b57dd6" fill-opacity="0.80" class="mono-soft" font-size="11">SEO</text>
      <text x="280" y="42" fill="#f5ebd8" fill-opacity="0.82" class="brand" font-size="14">Sitemap · Schema · Canonicals · robots.txt</text>
      <text x="1300" y="42" fill="#b57dd6" fill-opacity="0.75" class="mono-soft" font-size="10">INDEXABLE</text>
    </g>

    <!-- Band 3: Accessibilité -->
    <g transform="translate(200 402)">
      <rect x="0" y="0" width="1520" height="68" fill="none" stroke="#b57dd6" stroke-opacity="0.55" stroke-width="0.8"/>
      <g stroke="#8c47d1" stroke-opacity="0.32" stroke-width="0.5">
        <line x1="120" y1="0" x2="120" y2="68"/>
        <line x1="260" y1="0" x2="260" y2="68"/>
        <line x1="1280" y1="0" x2="1280" y2="68"/>
        <line x1="1400" y1="0" x2="1400" y2="68"/>
      </g>
      <text x="24" y="28" fill="#f5ebd8" fill-opacity="0.90" class="mono" font-size="11">03</text>
      <text x="24" y="52" fill="#b57dd6" fill-opacity="0.80" class="mono-soft" font-size="11">A11Y</text>
      <text x="280" y="42" fill="#f5ebd8" fill-opacity="0.82" class="brand" font-size="14">WCAG 2.1 AA — contraste, navigation clavier, alt</text>
      <text x="1300" y="42" fill="#b57dd6" fill-opacity="0.75" class="mono-soft" font-size="10">WCAG AA</text>
    </g>

    <!-- Band 4: Sécurité / nLPD -->
    <g transform="translate(200 478)">
      <rect x="0" y="0" width="1520" height="68" fill="none" stroke="#b57dd6" stroke-opacity="0.55" stroke-width="0.8"/>
      <g stroke="#8c47d1" stroke-opacity="0.32" stroke-width="0.5">
        <line x1="120" y1="0" x2="120" y2="68"/>
        <line x1="260" y1="0" x2="260" y2="68"/>
        <line x1="1280" y1="0" x2="1280" y2="68"/>
        <line x1="1400" y1="0" x2="1400" y2="68"/>
      </g>
      <text x="24" y="28" fill="#f5ebd8" fill-opacity="0.90" class="mono" font-size="11">04</text>
      <text x="24" y="52" fill="#b57dd6" fill-opacity="0.80" class="mono-soft" font-size="11">nLPD / CH</text>
      <text x="280" y="42" fill="#f5ebd8" fill-opacity="0.82" class="brand" font-size="14">Consentement · cookies · mentions légales</text>
      <text x="1300" y="42" fill="#b57dd6" fill-opacity="0.75" class="mono-soft" font-size="10">CONFORME</text>
    </g>

    <!-- Band 5: Hébergement (highlighted — center) -->
    <g transform="translate(200 554)">
      <rect x="0" y="0" width="1520" height="68" fill="#8c47d1" fill-opacity="0.08" stroke="#d9bff0" stroke-opacity="0.75" stroke-width="1"/>
      <g stroke="#8c47d1" stroke-opacity="0.32" stroke-width="0.5">
        <line x1="120" y1="0" x2="120" y2="68"/>
        <line x1="260" y1="0" x2="260" y2="68"/>
        <line x1="1280" y1="0" x2="1280" y2="68"/>
        <line x1="1400" y1="0" x2="1400" y2="68"/>
      </g>
      <text x="24" y="28" fill="#f5ebd8" class="mono" font-size="11">05</text>
      <text x="24" y="52" fill="#d9bff0" class="mono-soft" font-size="11">HOST &#183; CH</text>
      <text x="280" y="42" fill="#f5ebd8" class="brand" font-size="14">Infomaniak · data center suisse · HTTPS</text>
      <text x="1300" y="42" fill="#d9bff0" class="mono-soft" font-size="10">ZH / GE</text>
    </g>

    <!-- Band 6: Maintenance / propriété -->
    <g transform="translate(200 630)">
      <rect x="0" y="0" width="1520" height="68" fill="none" stroke="#b57dd6" stroke-opacity="0.55" stroke-width="0.8"/>
      <g stroke="#8c47d1" stroke-opacity="0.32" stroke-width="0.5">
        <line x1="120" y1="0" x2="120" y2="68"/>
        <line x1="260" y1="0" x2="260" y2="68"/>
        <line x1="1280" y1="0" x2="1280" y2="68"/>
        <line x1="1400" y1="0" x2="1400" y2="68"/>
      </g>
      <text x="24" y="28" fill="#f5ebd8" fill-opacity="0.90" class="mono" font-size="11">06</text>
      <text x="24" y="52" fill="#b57dd6" fill-opacity="0.80" class="mono-soft" font-size="11">PROPRIÉTÉ</text>
      <text x="280" y="42" fill="#f5ebd8" fill-opacity="0.82" class="brand" font-size="14">Code livré · domaine au nom du client · no lock-in</text>
      <text x="1300" y="42" fill="#b57dd6" fill-opacity="0.75" class="mono-soft" font-size="10">OWNED</text>
    </g>

    <!-- Band 7: Contenu éditorial -->
    <g transform="translate(200 706)">
      <rect x="0" y="0" width="1520" height="68" fill="none" stroke="#b57dd6" stroke-opacity="0.55" stroke-width="0.8"/>
      <g stroke="#8c47d1" stroke-opacity="0.32" stroke-width="0.5">
        <line x1="120" y1="0" x2="120" y2="68"/>
        <line x1="260" y1="0" x2="260" y2="68"/>
        <line x1="1280" y1="0" x2="1280" y2="68"/>
        <line x1="1400" y1="0" x2="1400" y2="68"/>
      </g>
      <text x="24" y="28" fill="#f5ebd8" fill-opacity="0.90" class="mono" font-size="11">07</text>
      <text x="24" y="52" fill="#b57dd6" fill-opacity="0.80" class="mono-soft" font-size="11">CONTENU</text>
      <text x="280" y="42" fill="#f5ebd8" fill-opacity="0.82" class="brand" font-size="14">Structure éditoriale · ton · mots-clés PME romandes</text>
      <text x="1300" y="42" fill="#b57dd6" fill-opacity="0.75" class="mono-soft" font-size="10">H1 · 1×</text>
    </g>
  </g>

  <!-- Scale bar (bottom) -->
  <g transform="translate(200 800)">
    <line x1="0" y1="0" x2="200" y2="0" stroke="#b57dd6" stroke-opacity="0.70" stroke-width="0.8"/>
    <g stroke="#b57dd6" stroke-opacity="0.70" stroke-width="0.6">
      <line x1="0" y1="-4" x2="0" y2="4"/>
      <line x1="50" y1="-3" x2="50" y2="3"/>
      <line x1="100" y1="-4" x2="100" y2="4"/>
      <line x1="150" y1="-3" x2="150" y2="3"/>
      <line x1="200" y1="-4" x2="200" y2="4"/>
    </g>
    <text x="0" y="20" fill="#b57dd6" fill-opacity="0.75" class="mono" font-size="9">0</text>
    <text x="100" y="20" text-anchor="middle" fill="#b57dd6" fill-opacity="0.75" class="mono" font-size="9">CHF 5K</text>
    <text x="200" y="20" text-anchor="end" fill="#b57dd6" fill-opacity="0.75" class="mono" font-size="9">CHF 10K</text>
    <text x="0" y="-10" fill="#b57dd6" fill-opacity="0.55" class="mono" font-size="8">ÉCHELLE &#183; BUDGET</text>
  </g>

  <!-- Title -->
  <text x="960" y="918" text-anchor="middle" fill="#f5ebd8" class="display" font-size="68">
    Créer un site<tspan fill="#b57dd6"> en 2026</tspan>
  </text>

  <text x="960" y="960" text-anchor="middle" fill="#b57dd6" fill-opacity="0.85" class="mono" font-size="13">
    CE QU'UNE PME SUISSE DOIT EXIGER DE SON PRESTATAIRE WEB
  </text>

  <!-- Corner annotations -->
  <g>
    <text x="100" y="118" fill="#f5ebd8" fill-opacity="0.95" class="brand" font-size="15">KUMO <tspan class="jp" fill="#b57dd6">蜘蛛</tspan></text>
    <text x="100" y="140" fill="#b57dd6" fill-opacity="0.70" class="mono" font-size="10">PLAN ARCHITECTURE · MMXXVI</text>
  </g>

  <g>
    <text x="1820" y="118" text-anchor="end" fill="#f5ebd8" fill-opacity="0.9" class="mono-soft" font-size="11">OBSERVATION N° 05 &#183; 26</text>
    <text x="1820" y="140" text-anchor="end" fill="#b57dd6" fill-opacity="0.70" class="mono" font-size="10">ÉCH. 1:10 000 &#183; CH</text>
  </g>

  <g>
    <text x="100" y="966" fill="#b57dd6" fill-opacity="0.55" class="mono" font-size="10">CRITÈRES</text>
    <text x="100" y="984" fill="#f5ebd8" fill-opacity="0.85" class="mono-soft" font-size="11">— 07 &#183; VALIDÉS</text>
    <text x="100" y="1004" fill="#b57dd6" fill-opacity="0.75" class="mono-soft" font-size="11">— BUDGET: CHF 3-10K</text>
    <text x="100" y="1024" fill="#b57dd6" fill-opacity="0.55" class="mono" font-size="10">— DÉLAI: 6-10 SEMAINES</text>
  </g>

  <g>
    <text x="1820" y="966" text-anchor="end" fill="#b57dd6" fill-opacity="0.55" class="mono" font-size="10">PLANCHE V</text>
    <text x="1820" y="984" text-anchor="end" fill="#f5ebd8" fill-opacity="0.85" class="mono-soft" font-size="11">DIAGRAMME 03 / 05</text>
    <text x="1820" y="1004" text-anchor="end" fill="#b57dd6" fill-opacity="0.70" class="mono-soft" font-size="11">KUMO-SEO.CH</text>
  </g>
</svg>
