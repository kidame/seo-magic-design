<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Freelance SEO ou agence en Suisse romande : diptyque comparatif KUMO. Deux diagrammes côte à côte.">
  <title>Freelance SEO vs Agence — Diptyque KUMO</title>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600&amp;family=JetBrains+Mono:wght@400;500&amp;family=Instrument+Serif:ital@1&amp;display=swap');
      .display   { font-family: 'Instrument Serif', 'Sora', Georgia, serif; font-style: italic; font-weight: 400; }
      .brand     { font-family: 'Sora', 'Helvetica Neue', Arial, sans-serif; font-weight: 600; letter-spacing: 0.04em; }
      .mono      { font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace; font-weight: 400; letter-spacing: 0.18em; }
      .mono-soft { font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace; font-weight: 400; letter-spacing: 0.12em; }
      .jp        { font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', serif; font-weight: 400; }
    </style>

    <radialGradient id="ground" cx="50%" cy="46%" r="70%">
      <stop offset="0%"   stop-color="#120a22"/>
      <stop offset="55%"  stop-color="#0a0714"/>
      <stop offset="100%" stop-color="#05030c"/>
    </radialGradient>

    <radialGradient id="auraL" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8c47d1" stop-opacity="0.22"/>
      <stop offset="45%"  stop-color="#6b2fb3" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#8c47d1" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="auraR" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8c47d1" stop-opacity="0.18"/>
      <stop offset="45%"  stop-color="#6b2fb3" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#8c47d1" stop-opacity="0"/>
    </radialGradient>

    <filter id="softglow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grain" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="0.6" fill="#b57dd6" fill-opacity="0.06"/>
      <circle cx="40" cy="40" r="0.4" fill="#b57dd6" fill-opacity="0.05"/>
    </pattern>

    <!-- Freelance spoke: tight, full-strength -->
    <g id="spokeL">
      <line x1="0" y1="0" x2="220" y2="0" stroke="#d9bff0" stroke-opacity="0.70" stroke-width="0.8"/>
      <circle cx="50"  cy="0" r="1.1" fill="#b57dd6" fill-opacity="0.85"/>
      <circle cx="105" cy="0" r="1.1" fill="#b57dd6" fill-opacity="0.80"/>
      <circle cx="160" cy="0" r="1.1" fill="#b57dd6" fill-opacity="0.75"/>
      <circle cx="220" cy="0" r="1.5" fill="#f5ebd8" fill-opacity="0.95"/>
    </g>

    <!-- Agence spoke: longer, softer, more diluted -->
    <g id="spokeR">
      <line x1="0" y1="0" x2="260" y2="0" stroke="#8c47d1" stroke-opacity="0.42" stroke-width="0.6"/>
      <circle cx="52"  cy="0" r="0.9" fill="#b57dd6" fill-opacity="0.55"/>
      <circle cx="110" cy="0" r="0.9" fill="#b57dd6" fill-opacity="0.50"/>
      <circle cx="170" cy="0" r="0.9" fill="#b57dd6" fill-opacity="0.45"/>
      <circle cx="225" cy="0" r="0.9" fill="#b57dd6" fill-opacity="0.40"/>
      <circle cx="260" cy="0" r="1.3" fill="#d9bff0" fill-opacity="0.70"/>
    </g>
  </defs>

  <rect width="1920" height="1080" fill="url(#ground)"/>
  <rect width="1920" height="1080" fill="url(#grain)"/>

  <rect x="80" y="80" width="1760" height="920" fill="none"
        stroke="#8c47d1" stroke-opacity="0.18" stroke-width="0.6"/>

  <g stroke="#d9bff0" stroke-opacity="0.45" stroke-width="1">
    <path d="M 60 96 L 96 96 M 96 60 L 96 96"/>
    <path d="M 1860 96 L 1824 96 M 1824 60 L 1824 96"/>
    <path d="M 60 984 L 96 984 M 96 1020 L 96 984"/>
    <path d="M 1860 984 L 1824 984 M 1824 1020 L 1824 984"/>
  </g>

  <!-- Central diptych separator -->
  <line x1="960" y1="200" x2="960" y2="820" stroke="#b57dd6" stroke-opacity="0.30" stroke-width="0.6" stroke-dasharray="4 6"/>
  <g stroke="#d9bff0" stroke-opacity="0.55" stroke-width="0.8">
    <line x1="950" y1="200" x2="970" y2="200"/>
    <line x1="950" y1="820" x2="970" y2="820"/>
  </g>
  <text x="960" y="190" text-anchor="middle" fill="#b57dd6" fill-opacity="0.70" class="mono" font-size="9">VS</text>

  <!-- ══════════════════ LEFT: FREELANCE (compact, dense) ══════════════════ -->
  <g transform="translate(500 510)">
    <circle cx="0" cy="0" r="300" fill="url(#auraL)"/>

    <!-- Rings — tight, bright -->
    <g fill="none" stroke="#d9bff0" stroke-opacity="0.60" stroke-width="0.7">
      <circle cx="0" cy="0" r="50"/>
      <circle cx="0" cy="0" r="100"/>
      <circle cx="0" cy="0" r="160"/>
      <circle cx="0" cy="0" r="220"/>
    </g>

    <!-- Octagonal armature -->
    <g fill="none" stroke="#d9bff0" stroke-opacity="0.80" stroke-width="1.1" filter="url(#softglow)">
      <polygon points="220,0 155.6,155.6 0,220 -155.6,155.6 -220,0 -155.6,-155.6 0,-220 155.6,-155.6"/>
    </g>

    <!-- Spokes -->
    <g filter="url(#softglow)">
      <use href="#spokeL" transform="rotate(0)"/>
      <use href="#spokeL" transform="rotate(45)"/>
      <use href="#spokeL" transform="rotate(90)"/>
      <use href="#spokeL" transform="rotate(135)"/>
      <use href="#spokeL" transform="rotate(180)"/>
      <use href="#spokeL" transform="rotate(225)"/>
      <use href="#spokeL" transform="rotate(270)"/>
      <use href="#spokeL" transform="rotate(315)"/>
    </g>

    <!-- Single luminous center (one person) -->
    <circle cx="0" cy="0" r="7" fill="#f5ebd8" fill-opacity="0.98"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#f5ebd8" stroke-opacity="0.55" stroke-width="0.8"/>

    <text x="0" y="-250" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.90" class="brand" font-size="13">FREELANCE</text>
    <text x="0" y="-232" text-anchor="middle" fill="#b57dd6" fill-opacity="0.75" class="mono" font-size="10">独立 · DOKURITSU</text>
  </g>

  <!-- Freelance metrics -->
  <g transform="translate(200 260)">
    <text x="0" y="0" fill="#b57dd6" fill-opacity="0.60" class="mono" font-size="10">PRESTATAIRE · TYPE A</text>
    <line x1="0" y1="10" x2="240" y2="10" stroke="#b57dd6" stroke-opacity="0.30" stroke-width="0.5"/>
  </g>
  <g transform="translate(200 840)">
    <text x="0" y="0" fill="#b57dd6" fill-opacity="0.55" class="mono" font-size="9">INTERLOCUTEUR</text>
    <text x="0" y="18" fill="#f5ebd8" fill-opacity="0.85" class="mono-soft" font-size="11">— 1 personne</text>
    <text x="0" y="38" fill="#b57dd6" fill-opacity="0.55" class="mono" font-size="9">TARIF HORAIRE</text>
    <text x="0" y="56" fill="#f5ebd8" fill-opacity="0.85" class="mono-soft" font-size="11">— CHF 80-150</text>
    <text x="0" y="76" fill="#b57dd6" fill-opacity="0.55" class="mono" font-size="9">RÉACTIVITÉ</text>
    <text x="0" y="94" fill="#d9bff0" class="mono-soft" font-size="11">— DIRECTE</text>
  </g>

  <!-- ══════════════════ RIGHT: AGENCE (large, distributed) ══════════════════ -->
  <g transform="translate(1420 510)">
    <circle cx="0" cy="0" r="320" fill="url(#auraR)"/>

    <!-- Rings — wider, softer -->
    <g fill="none" stroke="#8c47d1" stroke-opacity="0.40" stroke-width="0.5">
      <circle cx="0" cy="0" r="55"/>
      <circle cx="0" cy="0" r="110"/>
      <circle cx="0" cy="0" r="175"/>
      <circle cx="0" cy="0" r="225"/>
      <circle cx="0" cy="0" r="260"/>
    </g>

    <!-- Octagonal armature — softer -->
    <g fill="none" stroke="#b57dd6" stroke-opacity="0.50" stroke-width="0.8">
      <polygon points="260,0 183.8,183.8 0,260 -183.8,183.8 -260,0 -183.8,-183.8 0,-260 183.8,-183.8"/>
    </g>

    <!-- 16 spokes (more, diluted) -->
    <g>
      <use href="#spokeR" transform="rotate(0)"/>
      <use href="#spokeR" transform="rotate(22.5)"/>
      <use href="#spokeR" transform="rotate(45)"/>
      <use href="#spokeR" transform="rotate(67.5)"/>
      <use href="#spokeR" transform="rotate(90)"/>
      <use href="#spokeR" transform="rotate(112.5)"/>
      <use href="#spokeR" transform="rotate(135)"/>
      <use href="#spokeR" transform="rotate(157.5)"/>
      <use href="#spokeR" transform="rotate(180)"/>
      <use href="#spokeR" transform="rotate(202.5)"/>
      <use href="#spokeR" transform="rotate(225)"/>
      <use href="#spokeR" transform="rotate(247.5)"/>
      <use href="#spokeR" transform="rotate(270)"/>
      <use href="#spokeR" transform="rotate(292.5)"/>
      <use href="#spokeR" transform="rotate(315)"/>
      <use href="#spokeR" transform="rotate(337.5)"/>
    </g>

    <!-- Multiple cluster nodes (team) — distributed bright dots not at center -->
    <g fill="#d9bff0" fill-opacity="0.85">
      <circle cx="-30" cy="-18" r="3.5"/>
      <circle cx="25" cy="-30" r="3.5"/>
      <circle cx="35" cy="20" r="3.5"/>
      <circle cx="-20" cy="30" r="3.5"/>
    </g>
    <!-- Small internal coordinators -->
    <g fill="#b57dd6" fill-opacity="0.65">
      <circle cx="-55" cy="45" r="1.8"/>
      <circle cx="60" cy="-50" r="1.8"/>
      <circle cx="-75" cy="-35" r="1.8"/>
    </g>
    <!-- Connections between cluster nodes -->
    <g stroke="#b57dd6" stroke-opacity="0.55" stroke-width="0.5">
      <line x1="-30" y1="-18" x2="25" y2="-30"/>
      <line x1="25" y1="-30" x2="35" y2="20"/>
      <line x1="35" y1="20" x2="-20" y2="30"/>
      <line x1="-20" y1="30" x2="-30" y2="-18"/>
    </g>

    <text x="0" y="-290" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.80" class="brand" font-size="13">AGENCE</text>
    <text x="0" y="-272" text-anchor="middle" fill="#b57dd6" fill-opacity="0.75" class="mono" font-size="10">代理店 · DAIRITEN</text>
  </g>

  <!-- Agence metrics -->
  <g transform="translate(1480 260)">
    <text x="240" y="0" text-anchor="end" fill="#b57dd6" fill-opacity="0.60" class="mono" font-size="10">PRESTATAIRE · TYPE B</text>
    <line x1="0" y1="10" x2="240" y2="10" stroke="#b57dd6" stroke-opacity="0.30" stroke-width="0.5"/>
  </g>
  <g transform="translate(1480 840)">
    <text x="240" y="0" text-anchor="end" fill="#b57dd6" fill-opacity="0.55" class="mono" font-size="9">INTERLOCUTEUR</text>
    <text x="240" y="18" text-anchor="end" fill="#f5ebd8" fill-opacity="0.85" class="mono-soft" font-size="11">— 3-8 personnes</text>
    <text x="240" y="38" text-anchor="end" fill="#b57dd6" fill-opacity="0.55" class="mono" font-size="9">TARIF HORAIRE</text>
    <text x="240" y="56" text-anchor="end" fill="#f5ebd8" fill-opacity="0.85" class="mono-soft" font-size="11">— CHF 150-280</text>
    <text x="240" y="76" text-anchor="end" fill="#b57dd6" fill-opacity="0.55" class="mono" font-size="9">RÉACTIVITÉ</text>
    <text x="240" y="94" text-anchor="end" fill="#d9bff0" class="mono-soft" font-size="11">— FILTRÉE</text>
  </g>

  <!-- Title (centered below) -->
  <text x="960" y="912" text-anchor="middle" fill="#f5ebd8" class="display" font-size="68">
    Freelance<tspan fill="#b57dd6"> ou </tspan>Agence
  </text>

  <text x="960" y="956" text-anchor="middle" fill="#b57dd6" fill-opacity="0.85" class="mono" font-size="13">
    CHOISIR SON PRESTATAIRE SEO &#8212; SUISSE ROMANDE
  </text>

  <!-- Corner annotations -->
  <g>
    <text x="100" y="118" fill="#f5ebd8" fill-opacity="0.95" class="brand" font-size="15">KUMO <tspan class="jp" fill="#b57dd6">蜘蛛</tspan></text>
    <text x="100" y="140" fill="#b57dd6" fill-opacity="0.70" class="mono" font-size="10">DIPTYQUE COMPARATIF · MMXXVI</text>
  </g>

  <g>
    <text x="1820" y="118" text-anchor="end" fill="#f5ebd8" fill-opacity="0.9" class="mono-soft" font-size="11">OBSERVATION N° 06 &#183; 26</text>
    <text x="1820" y="140" text-anchor="end" fill="#b57dd6" fill-opacity="0.70" class="mono" font-size="10">A / B &#183; CH</text>
  </g>

  <g>
    <text x="100" y="966" fill="#b57dd6" fill-opacity="0.55" class="mono" font-size="10">MÉTHODE</text>
    <text x="100" y="984" fill="#f5ebd8" fill-opacity="0.85" class="mono-soft" font-size="11">— OBJECTIVE</text>
    <text x="100" y="1004" fill="#b57dd6" fill-opacity="0.75" class="mono-soft" font-size="11">— CRITÈRES: 6</text>
    <text x="100" y="1024" fill="#b57dd6" fill-opacity="0.55" class="mono" font-size="10">— SANS PARTI PRIS</text>
  </g>

  <g>
    <text x="1820" y="966" text-anchor="end" fill="#b57dd6" fill-opacity="0.55" class="mono" font-size="10">PLANCHE V</text>
    <text x="1820" y="984" text-anchor="end" fill="#f5ebd8" fill-opacity="0.85" class="mono-soft" font-size="11">DIAGRAMME 04 / 05</text>
    <text x="1820" y="1004" text-anchor="end" fill="#b57dd6" fill-opacity="0.70" class="mono-soft" font-size="11">KUMO-SEO.CH</text>
  </g>
</svg>
