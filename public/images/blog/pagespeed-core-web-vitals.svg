<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Core Web Vitals KUMO — trois colonnes LCP, INP et CLS avec zones de seuils bon/à améliorer/médiocre pour l'évaluation Google Page Experience.">
  <title>Core Web Vitals — LCP · INP · CLS — KUMO</title>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600&amp;family=JetBrains+Mono:wght@400;500&amp;family=Instrument+Serif:ital@1&amp;display=swap');
      .display   { font-family: 'Instrument Serif', 'Sora', Georgia, serif; font-style: italic; font-weight: 400; }
      .brand     { font-family: 'Sora', 'Helvetica Neue', Arial, sans-serif; font-weight: 600; letter-spacing: 0.04em; }
      .mono      { font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace; font-weight: 400; letter-spacing: 0.18em; }
      .mono-soft { font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace; font-weight: 400; letter-spacing: 0.12em; }
      .num       { font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace; font-weight: 500; letter-spacing: 0.04em; }
      .jp        { font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', serif; font-weight: 400; }
    </style>

    <radialGradient id="ground" cx="50%" cy="46%" r="70%">
      <stop offset="0%"   stop-color="#120a22"/>
      <stop offset="55%"  stop-color="#0a0714"/>
      <stop offset="100%" stop-color="#05030c"/>
    </radialGradient>

    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8c47d1" stop-opacity="0.20"/>
      <stop offset="50%"  stop-color="#6b2fb3" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#8c47d1" stop-opacity="0"/>
    </radialGradient>

    <filter id="softglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grain" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="0.6" fill="#b57dd6" fill-opacity="0.06"/>
      <circle cx="40" cy="40" r="0.4" fill="#b57dd6" fill-opacity="0.05"/>
    </pattern>

    <!-- Indicator dot pour niveau bon -->
    <g id="dotGood">
      <circle cx="0" cy="0" r="6" fill="none" stroke="#6fbf8a" stroke-opacity="0.80" stroke-width="0.9"/>
      <circle cx="0" cy="0" r="1.8" fill="#6fbf8a"/>
    </g>
    <g id="dotWarn">
      <circle cx="0" cy="0" r="6" fill="none" stroke="#d8a55c" stroke-opacity="0.85" stroke-width="0.9"/>
      <circle cx="0" cy="0" r="1.8" fill="#d8a55c"/>
    </g>
    <g id="dotBad">
      <circle cx="0" cy="0" r="6" fill="none" stroke="#c86464" stroke-opacity="0.85" stroke-width="0.9"/>
      <circle cx="0" cy="0" r="1.8" fill="#c86464"/>
    </g>
  </defs>

  <rect width="1920" height="1080" fill="url(#ground)"/>
  <rect width="1920" height="1080" fill="url(#grain)"/>

  <rect x="80" y="80" width="1760" height="920" fill="none"
        stroke="#8c47d1" stroke-opacity="0.18" stroke-width="0.6"/>

  <g stroke="#d9bff0" stroke-opacity="0.45" stroke-width="1">
    <path d="M 60 96 L 96 96 M 96 60 L 96 96"/>
    <path d="M 1860 96 L 1824 96 M 1824 60 L 1824 96"/>
    <path d="M 60 984 L 96 984 M 96 1020 L 96 984"/>
    <path d="M 1860 984 L 1824 984 M 1824 1020 L 1824 984"/>
  </g>

  <!-- Central aura halo -->
  <g transform="translate(960 520)">
    <circle cx="0" cy="0" r="620" fill="url(#aura)"/>
  </g>

  <!-- ═══════════════ EN-TÊTE ═══════════════ -->
  <text x="100" y="118" fill="#f5ebd8" fill-opacity="0.95" class="brand" font-size="15">KUMO <tspan class="jp" fill="#b57dd6">蜘蛛</tspan></text>
  <text x="100" y="140" fill="#b57dd6" fill-opacity="0.70" class="mono" font-size="10">MESURES DE PERFORMANCE · CH · MMXXVI</text>

  <text x="1820" y="118" text-anchor="end" fill="#f5ebd8" fill-opacity="0.9" class="mono-soft" font-size="11">OBSERVATION N° 08 &#183; 26</text>
  <text x="1820" y="140" text-anchor="end" fill="#b57dd6" fill-opacity="0.70" class="mono" font-size="10">CORE WEB VITALS &#215; GOOGLE</text>

  <!-- Sous-titre central -->
  <text x="960" y="210" text-anchor="middle" fill="#b57dd6" fill-opacity="0.80" class="mono" font-size="12">
    ÉVALUATION PAGE EXPERIENCE &#183; SEUILS 75e PERCENTILE
  </text>

  <!-- ═══════════════ AXE VERTICAL COMMUN ═══════════════ -->
  <!-- y=280 haut (médiocre), y=760 bas (bon) -->
  <g stroke="#8c47d1" stroke-opacity="0.20" stroke-width="0.5">
    <line x1="300" y1="280" x2="1620" y2="280"/>
    <line x1="300" y1="440" x2="1620" y2="440"/>
    <line x1="300" y1="600" x2="1620" y2="600"/>
    <line x1="300" y1="760" x2="1620" y2="760"/>
  </g>

  <!-- Labels latéraux des zones -->
  <text x="140" y="360" fill="#c86464" fill-opacity="0.75" class="mono" font-size="10">ZONE</text>
  <text x="140" y="378" fill="#c86464" fill-opacity="0.85" class="brand" font-size="12">MÉDIOCRE</text>

  <text x="140" y="520" fill="#d8a55c" fill-opacity="0.75" class="mono" font-size="10">ZONE</text>
  <text x="140" y="538" fill="#d8a55c" fill-opacity="0.85" class="brand" font-size="12">A AMÉLIORER</text>

  <text x="140" y="680" fill="#6fbf8a" fill-opacity="0.75" class="mono" font-size="10">ZONE</text>
  <text x="140" y="698" fill="#6fbf8a" fill-opacity="0.90" class="brand" font-size="12">BON</text>

  <!-- Tick labels côté droit -->
  <text x="1780" y="284" text-anchor="end" fill="#f5ebd8" fill-opacity="0.55" class="mono" font-size="9">&#8801; seuil haut</text>
  <text x="1780" y="764" text-anchor="end" fill="#f5ebd8" fill-opacity="0.55" class="mono" font-size="9">&#8801; seuil cible</text>

  <!-- ═══════════════ COLONNE 1 : LCP ═══════════════ -->
  <g transform="translate(520 0)">
    <!-- Bandeau colonne -->
    <text x="0" y="258" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.90" class="brand" font-size="11">01</text>

    <!-- Zones colorées superposées -->
    <rect x="-90" y="280" width="180" height="160" fill="#3a1515" fill-opacity="0.40" stroke="#c86464" stroke-opacity="0.35" stroke-width="0.6"/>
    <rect x="-90" y="440" width="180" height="160" fill="#3a2a10" fill-opacity="0.40" stroke="#d8a55c" stroke-opacity="0.35" stroke-width="0.6"/>
    <rect x="-90" y="600" width="180" height="160" fill="#122a18" fill-opacity="0.40" stroke="#6fbf8a" stroke-opacity="0.45" stroke-width="0.6"/>

    <!-- Valeurs seuil -->
    <text x="0" y="336" text-anchor="middle" fill="#e0a0a0" fill-opacity="0.95" class="num" font-size="16">&gt; 4,0 s</text>
    <text x="0" y="356" text-anchor="middle" fill="#c86464" fill-opacity="0.65" class="mono" font-size="9">DÉCROCHE L'EXPÉRIENCE</text>

    <text x="0" y="498" text-anchor="middle" fill="#e4c58e" fill-opacity="0.95" class="num" font-size="16">2,5 &#8211; 4,0 s</text>
    <text x="0" y="518" text-anchor="middle" fill="#d8a55c" fill-opacity="0.65" class="mono" font-size="9">PERCEPTIBLE, À CORRIGER</text>

    <text x="0" y="658" text-anchor="middle" fill="#a0dcb4" fill-opacity="0.95" class="num" font-size="16">&#8804; 2,5 s</text>
    <text x="0" y="678" text-anchor="middle" fill="#6fbf8a" fill-opacity="0.75" class="mono" font-size="9">SEUIL CIBLE GOOGLE</text>

    <!-- Marqueurs indicatifs -->
    <g transform="translate(-58 760)"><use href="#dotGood"/></g>
    <g transform="translate(0 760)"><use href="#dotGood"/></g>
    <g transform="translate(58 760)"><use href="#dotGood"/></g>

    <!-- Titre colonne -->
    <text x="0" y="830" text-anchor="middle" fill="#f5ebd8" class="display" font-size="72">LCP</text>
    <text x="0" y="860" text-anchor="middle" fill="#b57dd6" fill-opacity="0.85" class="mono" font-size="10">LARGEST CONTENTFUL PAINT</text>
    <text x="0" y="882" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.55" class="mono-soft" font-size="9">vitesse d'affichage du contenu principal</text>
  </g>

  <!-- ═══════════════ COLONNE 2 : INP ═══════════════ -->
  <g transform="translate(960 0)">
    <text x="0" y="258" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.90" class="brand" font-size="11">02</text>

    <rect x="-90" y="280" width="180" height="160" fill="#3a1515" fill-opacity="0.40" stroke="#c86464" stroke-opacity="0.35" stroke-width="0.6"/>
    <rect x="-90" y="440" width="180" height="160" fill="#3a2a10" fill-opacity="0.40" stroke="#d8a55c" stroke-opacity="0.35" stroke-width="0.6"/>
    <rect x="-90" y="600" width="180" height="160" fill="#122a18" fill-opacity="0.40" stroke="#6fbf8a" stroke-opacity="0.45" stroke-width="0.6"/>

    <text x="0" y="336" text-anchor="middle" fill="#e0a0a0" fill-opacity="0.95" class="num" font-size="16">&gt; 500 ms</text>
    <text x="0" y="356" text-anchor="middle" fill="#c86464" fill-opacity="0.65" class="mono" font-size="9">INTERFACE FIGÉE</text>

    <text x="0" y="498" text-anchor="middle" fill="#e4c58e" fill-opacity="0.95" class="num" font-size="16">200 &#8211; 500 ms</text>
    <text x="0" y="518" text-anchor="middle" fill="#d8a55c" fill-opacity="0.65" class="mono" font-size="9">RÉACTIVITÉ MOLLE</text>

    <text x="0" y="658" text-anchor="middle" fill="#a0dcb4" fill-opacity="0.95" class="num" font-size="16">&#8804; 200 ms</text>
    <text x="0" y="678" text-anchor="middle" fill="#6fbf8a" fill-opacity="0.75" class="mono" font-size="9">SEUIL CIBLE GOOGLE</text>

    <g transform="translate(-58 760)"><use href="#dotWarn"/></g>
    <g transform="translate(0 760)"><use href="#dotGood"/></g>
    <g transform="translate(58 760)"><use href="#dotGood"/></g>

    <text x="0" y="830" text-anchor="middle" fill="#f5ebd8" class="display" font-size="72">INP</text>
    <text x="0" y="860" text-anchor="middle" fill="#b57dd6" fill-opacity="0.85" class="mono" font-size="10">INTERACTION TO NEXT PAINT</text>
    <text x="0" y="882" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.55" class="mono-soft" font-size="9">réactivité aux clics et interactions</text>
  </g>

  <!-- ═══════════════ COLONNE 3 : CLS ═══════════════ -->
  <g transform="translate(1400 0)">
    <text x="0" y="258" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.90" class="brand" font-size="11">03</text>

    <rect x="-90" y="280" width="180" height="160" fill="#3a1515" fill-opacity="0.40" stroke="#c86464" stroke-opacity="0.35" stroke-width="0.6"/>
    <rect x="-90" y="440" width="180" height="160" fill="#3a2a10" fill-opacity="0.40" stroke="#d8a55c" stroke-opacity="0.35" stroke-width="0.6"/>
    <rect x="-90" y="600" width="180" height="160" fill="#122a18" fill-opacity="0.40" stroke="#6fbf8a" stroke-opacity="0.45" stroke-width="0.6"/>

    <text x="0" y="336" text-anchor="middle" fill="#e0a0a0" fill-opacity="0.95" class="num" font-size="16">&gt; 0,25</text>
    <text x="0" y="356" text-anchor="middle" fill="#c86464" fill-opacity="0.65" class="mono" font-size="9">MISE EN PAGE INSTABLE</text>

    <text x="0" y="498" text-anchor="middle" fill="#e4c58e" fill-opacity="0.95" class="num" font-size="16">0,10 &#8211; 0,25</text>
    <text x="0" y="518" text-anchor="middle" fill="#d8a55c" fill-opacity="0.65" class="mono" font-size="9">DÉCALAGES VISIBLES</text>

    <text x="0" y="658" text-anchor="middle" fill="#a0dcb4" fill-opacity="0.95" class="num" font-size="16">&#8804; 0,10</text>
    <text x="0" y="678" text-anchor="middle" fill="#6fbf8a" fill-opacity="0.75" class="mono" font-size="9">SEUIL CIBLE GOOGLE</text>

    <g transform="translate(-58 760)"><use href="#dotGood"/></g>
    <g transform="translate(0 760)"><use href="#dotGood"/></g>
    <g transform="translate(58 760)"><use href="#dotBad"/></g>

    <text x="0" y="830" text-anchor="middle" fill="#f5ebd8" class="display" font-size="72">CLS</text>
    <text x="0" y="860" text-anchor="middle" fill="#b57dd6" fill-opacity="0.85" class="mono" font-size="10">CUMULATIVE LAYOUT SHIFT</text>
    <text x="0" y="882" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.55" class="mono-soft" font-size="9">stabilité visuelle de la mise en page</text>
  </g>

  <!-- ═══════════════ TITRE PRINCIPAL ═══════════════ -->
  <text x="960" y="946" text-anchor="middle" fill="#f5ebd8" class="display" font-size="52">
    Les trois mesures<tspan fill="#b57dd6"> qui comptent</tspan>
  </text>

  <!-- Annotations pied de page -->
  <g>
    <text x="100" y="966" fill="#b57dd6" fill-opacity="0.55" class="mono" font-size="10">LECTURE</text>
    <text x="100" y="984" fill="#f5ebd8" fill-opacity="0.85" class="mono-soft" font-size="11">&#8212; DONNÉES DE TERRAIN</text>
    <text x="100" y="1004" fill="#b57dd6" fill-opacity="0.75" class="mono-soft" font-size="11">&#8212; CHROME UX REPORT</text>
    <text x="100" y="1024" fill="#b57dd6" fill-opacity="0.55" class="mono" font-size="10">&#8212; 75e PERCENTILE</text>
  </g>

  <g>
    <text x="1820" y="966" text-anchor="end" fill="#b57dd6" fill-opacity="0.55" class="mono" font-size="10">PLANCHE VI</text>
    <text x="1820" y="984" text-anchor="end" fill="#f5ebd8" fill-opacity="0.85" class="mono-soft" font-size="11">DIAGRAMME 06 / 06</text>
    <text x="1820" y="1004" text-anchor="end" fill="#b57dd6" fill-opacity="0.70" class="mono-soft" font-size="11">KUMO-SEO.CH</text>
  </g>
</svg>
