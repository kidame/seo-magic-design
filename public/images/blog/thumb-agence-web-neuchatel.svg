<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Thumbnail KUMO — triptyque comparant agence, freelance et plateforme Wix pour PME à Neuchâtel.">
