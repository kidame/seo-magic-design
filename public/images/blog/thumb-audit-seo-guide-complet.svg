<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Thumbnail KUMO — quatre quadrants de l'audit SEO (technique, contenu, local, backlinks).">
  <title>Audit SEO complet — Thumbnail</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600&amp;family=JetBrains+Mono:wght@400;500&amp;family=Instrument+Serif:ital@1&amp;display=swap');
      .display { font-family: 'Instrument Serif', 'Sora', Georgia, serif; font-style: italic; font-weight: 400; }
      .brand   { font-family: 'Sora', 'Helvetica Neue', Arial, sans-serif; font-weight: 600; letter-spacing: 0.04em; }
      .mono    { font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace; font-weight: 400; letter-spacing: 0.14em; }
    </style>
    <radialGradient id="g" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#120a22"/>
      <stop offset="55%" stop-color="#0a0714"/>
      <stop offset="100%" stop-color="#05030c"/>
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8c47d1" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#8c47d1" stop-opacity="0"/>
    </radialGradient>
    <filter id="sg" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#g)"/>
  <rect x="28" y="28" width="744" height="394" fill="none" stroke="#8c47d1" stroke-opacity="0.20" stroke-width="0.5"/>
  <g stroke="#d9bff0" stroke-opacity="0.45" stroke-width="0.8">
    <path d="M 18 36 L 36 36 M 36 18 L 36 36"/>
    <path d="M 782 36 L 764 36 M 764 18 L 764 36"/>
    <path d="M 18 414 L 36 414 M 36 432 L 36 414"/>
    <path d="M 782 414 L 764 414 M 764 432 L 764 414"/>
  </g>

  <!-- aura centrale -->
  <g transform="translate(400 200)">
    <circle cx="0" cy="0" r="220" fill="url(#aura)"/>
  </g>

  <!-- Grille 2x2 : 4 quadrants -->
  <g transform="translate(400 200)">
    <!-- Axes -->
    <line x1="-260" y1="0" x2="260" y2="0" stroke="#b57dd6" stroke-opacity="0.50" stroke-width="0.7"/>
    <line x1="0" y1="-120" x2="0" y2="120" stroke="#b57dd6" stroke-opacity="0.50" stroke-width="0.7"/>

    <!-- 4 cadres -->
    <rect x="-250" y="-115" width="240" height="105" fill="#120a22" fill-opacity="0.50" stroke="#8c47d1" stroke-opacity="0.35" stroke-width="0.6"/>
    <rect x="10"   y="-115" width="240" height="105" fill="#120a22" fill-opacity="0.50" stroke="#8c47d1" stroke-opacity="0.35" stroke-width="0.6"/>
    <rect x="-250" y="10"   width="240" height="105" fill="#120a22" fill-opacity="0.50" stroke="#8c47d1" stroke-opacity="0.35" stroke-width="0.6"/>
    <rect x="10"   y="10"   width="240" height="105" fill="#120a22" fill-opacity="0.50" stroke="#8c47d1" stroke-opacity="0.35" stroke-width="0.6"/>

    <!-- Q1 : TECHNIQUE -->
    <text x="-130" y="-90" text-anchor="middle" fill="#b57dd6" fill-opacity="0.85" class="mono" font-size="7.5">01</text>
    <text x="-130" y="-65" text-anchor="middle" fill="#f5ebd8" class="display" font-size="22">Technique</text>
    <text x="-130" y="-45" text-anchor="middle" fill="#b57dd6" fill-opacity="0.75" class="mono" font-size="7">INDEXATION · CWV · HTML</text>
    <g transform="translate(-130 -22)" fill="none" stroke="#d9bff0" stroke-opacity="0.60" stroke-width="0.7" filter="url(#sg)">
      <circle cx="0" cy="0" r="6"/>
      <circle cx="0" cy="0" r="10"/>
    </g>

    <!-- Q2 : CONTENU -->
    <text x="130" y="-90" text-anchor="middle" fill="#b57dd6" fill-opacity="0.85" class="mono" font-size="7.5">02</text>
    <text x="130" y="-65" text-anchor="middle" fill="#f5ebd8" class="display" font-size="22">Contenu</text>
    <text x="130" y="-45" text-anchor="middle" fill="#b57dd6" fill-opacity="0.75" class="mono" font-size="7">KEYWORDS · H1 · INTENTION</text>
    <g transform="translate(130 -22)" fill="none" stroke="#d9bff0" stroke-opacity="0.60" stroke-width="0.7">
      <path d="M -8 0 L 8 0 M 0 -8 L 0 8 M -5 -5 L 5 5 M -5 5 L 5 -5"/>
    </g>

    <!-- Q3 : LOCAL -->
    <text x="-130" y="35" text-anchor="middle" fill="#b57dd6" fill-opacity="0.85" class="mono" font-size="7.5">03</text>
    <text x="-130" y="60" text-anchor="middle" fill="#f5ebd8" class="display" font-size="22">Local</text>
    <text x="-130" y="80" text-anchor="middle" fill="#b57dd6" fill-opacity="0.75" class="mono" font-size="7">NAP · GBP · ANNUAIRES</text>
    <g transform="translate(-130 103)" fill="none" stroke="#d9bff0" stroke-opacity="0.60" stroke-width="0.7">
      <path d="M 0 -7 L 6 3 L -6 3 Z"/>
      <circle cx="0" cy="-1" r="2" fill="#b57dd6"/>
    </g>

    <!-- Q4 : BACKLINKS -->
    <text x="130" y="35" text-anchor="middle" fill="#b57dd6" fill-opacity="0.85" class="mono" font-size="7.5">04</text>
    <text x="130" y="60" text-anchor="middle" fill="#f5ebd8" class="display" font-size="22">Backlinks</text>
    <text x="130" y="80" text-anchor="middle" fill="#b57dd6" fill-opacity="0.75" class="mono" font-size="7">AUTORITÉ · TOXICITÉ · GAP</text>
    <g transform="translate(130 103)" fill="none" stroke="#d9bff0" stroke-opacity="0.60" stroke-width="0.7">
      <line x1="-8" y1="0" x2="-2" y2="0"/>
      <line x1="2" y1="0" x2="8" y2="0"/>
      <circle cx="-3" cy="0" r="2"/>
      <circle cx="3" cy="0" r="2"/>
    </g>

    <!-- Hub central -->
    <circle cx="0" cy="0" r="22" fill="#05030c" fill-opacity="0.90" stroke="#b57dd6" stroke-opacity="0.70" stroke-width="0.8"/>
    <text x="0" y="3" text-anchor="middle" fill="#f5ebd8" fill-opacity="0.95" class="brand" font-size="9">AUDIT</text>
  </g>

  <!-- Bandeau KUMO -->
  <text x="40" y="46" fill="#f5ebd8" fill-opacity="0.92" class="brand" font-size="10">KUMO</text>
  <text x="760" y="46" text-anchor="end" fill="#b57dd6" fill-opacity="0.70" class="mono" font-size="8">07 / 07</text>

  <!-- Sous-titre principal -->
  <text x="400" y="380" text-anchor="middle" fill="#f5ebd8" class="display" font-size="30">
    Audit SEO<tspan fill="#b57dd6"> &#183; les 4 composantes</tspan>
  </text>
  <text x="400" y="402" text-anchor="middle" fill="#b57dd6" fill-opacity="0.85" class="mono" font-size="8.5">
    GUIDE COMPLET &#183; PME SUISSES &#183; 2026
  </text>
</svg>
